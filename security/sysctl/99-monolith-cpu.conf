# Monolith OS — CPU & Scheduler Tuning
# /etc/sysctl.d/99-monolith-cpu.conf
#
# Goal: every workload that runs on this box should fan out across
# every available CPU core and hardware thread. The sysctls below
# back the defaults applied by `mnctl tune cpu` — they bias the
# scheduler toward server-style throughput rather than desktop-style
# latency, while keeping fairness for multi-tenant containers.

# --- CFS / EEVDF scheduler --------------------------------------------------
# Group tasks belonging to the same TTY/session so a single noisy
# process can't starve the others. This is the upstream default but
# we set it explicitly so nothing else rewrites it.
kernel.sched_autogroup_enabled = 1

# Spread runnable tasks across NUMA nodes opportunistically.
# 1 = enabled (default); kept explicit because some hosters disable
# it on small VMs and we want the wider parallelism back.
kernel.numa_balancing = 1

# --- Watchdogs --------------------------------------------------------------
# Drop the soft-lockup watchdog from a per-CPU thread to a single
# lightweight one — frees a kernel thread on every core for real
# work.
kernel.watchdog_cpumask = 0

# --- Memory / hugepages -----------------------------------------------------
# Servers benefit from being able to over-commit and from hugepages
# defragging in the background instead of blocking allocations.
vm.overcommit_memory = 1
vm.max_map_count = 1048576

# Keep the per-cpu vmstat counters fresh so monitoring tools see
# load shifting between cores in near real time.
vm.stat_interval = 1

# Disable zone reclaim — on multi-socket boxes the default of "1"
# causes runqueues to stay pinned to the local NUMA node and starves
# the other socket of work.
vm.zone_reclaim_mode = 0

# --- File descriptors / async I/O ------------------------------------------
fs.file-max = 2097152
fs.aio-max-nr = 1048576
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 8192
