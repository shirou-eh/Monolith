# Monolith OS — System Resource Limits
# /etc/security/limits.d/monolith.conf

# Increase open file descriptors for server workloads
*               soft    nofile          1048576
*               hard    nofile          1048576
root            soft    nofile          1048576
root            hard    nofile          1048576

# Max user processes
*               soft    nproc           65535
*               hard    nproc           65535

# Core dumps (disabled for security)
*               hard    core            0
