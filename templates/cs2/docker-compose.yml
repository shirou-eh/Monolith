# Monolith OS — Counter-Strike 2 Dedicated Server Template
services:
  cs2:
    image: joedwards32/cs2
    container_name: monolith-cs2
    ports:
      - "27015:27015/tcp"
      - "27015:27015/udp"
      - "27020:27020/udp"
    environment:
      SRCDS_TOKEN: ""  # Required: Get from https://steamcommunity.com/dev/managegameservers
      CS2_SERVERNAME: "Monolith CS2 Server"
      CS2_PORT: 27015
      CS2_MAXPLAYERS: 10
      CS2_GAMETYPE: 0
      CS2_GAMEMODE: 1
      CS2_MAPGROUP: "mg_active"
      CS2_STARTMAP: "de_dust2"
    volumes:
      - cs2-data:/home/steam/cs2-dedicated
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G

volumes:
  cs2-data:
