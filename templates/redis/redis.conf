# Monolith OS — Optimized Redis Configuration
bind 0.0.0.0
port 6379
protected-mode yes
requirepass changeme

# Memory
maxmemory 1gb
maxmemory-policy allkeys-lru

# Persistence — AOF
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Persistence — RDB
save 900 1
save 300 10
save 60 10000

# Performance
tcp-backlog 511
timeout 300
tcp-keepalive 300
hz 10

# Logging
loglevel notice
logfile ""
