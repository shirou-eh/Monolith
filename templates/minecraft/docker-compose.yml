# Monolith OS — Minecraft Java Edition Server Template
services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: monolith-minecraft
    ports:
      - "25565:25565"
      - "25575:25575"  # RCON
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"  # VANILLA, PAPER, FABRIC, FORGE
      VERSION: "LATEST"
      MEMORY: "4G"
      MOTD: "Monolith Minecraft Server"
      GAMEMODE: "survival"
      DIFFICULTY: "normal"
      MAX_PLAYERS: 20
      VIEW_DISTANCE: 12
      ENABLE_RCON: "true"
      RCON_PASSWORD: "changeme"
      SPAWN_PROTECTION: 0
      ENABLE_COMMAND_BLOCK: "true"
    volumes:
      - minecraft-data:/data
      - minecraft-plugins:/plugins
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 4G
    healthcheck:
      test: mc-health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  minecraft-data:
  minecraft-plugins:
