# Monolith OS — Python Discord Bot Template
# Compatible with disnake, discord.py, nextcord
services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monolith-discord-bot
    env_file:
      - .env
    volumes:
      - bot-data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  bot-data:
