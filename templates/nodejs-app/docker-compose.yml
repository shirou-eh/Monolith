# Monolith OS — Node.js Application Template
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monolith-nodejs
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  app-data:
