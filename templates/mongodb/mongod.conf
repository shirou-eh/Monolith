# Monolith OS — MongoDB 7 server config
# Mounted into the container at /etc/mongod.conf.

storage:
  dbPath: /data/db
  wiredTiger:
    engineConfig:
      cacheSizeGB: 2
      journalCompressor: snappy
    collectionConfig:
      blockCompressor: snappy

net:
  port: 27017
  bindIp: 0.0.0.0
  ipv6: true
  maxIncomingConnections: 1024

security:
  authorization: enabled

systemLog:
  destination: file
  path: /var/log/mongodb/mongod.log
  logAppend: true
  verbosity: 0

operationProfiling:
  slowOpThresholdMs: 100
  mode: slowOp

processManagement:
  timeZoneInfo: /usr/share/zoneinfo
