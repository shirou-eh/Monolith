# Monolith OS — MongoDB 7 Server Template
services:
  mongodb:
    image: mongo:7
    container_name: monolith-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: monolith
      MONGO_INITDB_ROOT_PASSWORD: changeme
      MONGO_INITDB_DATABASE: monolith
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
      - ./mongod.conf:/etc/mongod.conf:ro
    command: ["mongod", "--config", "/etc/mongod.conf"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test:
        - CMD
        - mongosh
        - --quiet
        - --eval
        - "db.adminCommand('ping').ok"
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Mongo Express web UI on http://localhost:8081
  # mongo-express:
  #   image: mongo-express:latest
  #   container_name: monolith-mongo-express
  #   ports:
  #     - "8081:8081"
  #   environment:
  #     ME_CONFIG_MONGODB_ADMINUSERNAME: monolith
  #     ME_CONFIG_MONGODB_ADMINPASSWORD: changeme
  #     ME_CONFIG_MONGODB_URL: mongodb://monolith:changeme@mongodb:27017/
  #     ME_CONFIG_BASICAUTH_USERNAME: admin
  #     ME_CONFIG_BASICAUTH_PASSWORD: changeme
  #   depends_on:
  #     - mongodb
  #   restart: unless-stopped

volumes:
  mongodb-data:
  mongodb-config:
