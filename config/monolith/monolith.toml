# Monolith OS Master Configuration
# /etc/monolith/monolith.toml
# Version: 1.0.1 "Obsidian"

[system]
hostname = ""
timezone = "UTC"
locale = "en_US.UTF-8"
codename = "Obsidian"
version = "1.0.1"
# Resource profile: "lite" (≥512 MB RAM, single-app hosts like Discord bots),
# "full" (≥2 GB, default for home servers), or "pro" (≥8 GB, production).
profile = "full"

[update]
auto_update = false
auto_reboot = false
schedule = "0 4 * * 0"
snapshot_before_update = true
security_only = false

[backup]
enabled = true
schedule = "0 3 * * *"
retention_days = 30
snapshot_enabled = true
paths = ["/", "/home"]

[backup.restic]
repository = "/mnt/backup"
password_file = "/etc/monolith/restic-password"

[monitoring]
enabled = true
prometheus_port = 9090
grafana_port = 3000
loki_port = 3100
node_exporter_port = 9100

[security]
ssh_port = 2222
fail2ban_enabled = true
apparmor_enabled = true
firewall_enabled = true
auto_security_updates = true
hardening_level = "server"

[network]
dns_servers = ["1.1.1.1", "1.0.0.1"]
ipv6_enabled = true

[notifications]
enabled = false
webhook_url = ""
email = ""

[notifications.smtp]
enabled = false
host = ""
port = 587
user = ""
password = ""
password_file = ""
security = "starttls"
from = ""

[webui]
enabled = false
bind = "127.0.0.1:9911"
read_only = false
# Bearer token for API authentication. Leave empty to disable auth (not recommended).
token = ""

[kubernetes]
enabled = false
role = "server"
channel = "stable"
disable_traefik = true

[disks]
smart_check_enabled = true
smart_check_schedule = "0 6 * * *"
smart_alert_temperature_celsius = 60

# Performance tuning defaults applied by `mnctl tune` and the systemd
# `monolith-tune.service` unit. These spread CPU load across every
# core/thread and pick a sensible I/O elevator per device class.
[performance]
# CPU governor preset: "performance", "balanced", or "powersave".
cpu_governor = "performance"
# Energy/perf hint for Intel/AMD HWP — matches the governor by default.
energy_performance_preference = "performance"
# Apply the tuning automatically at every boot.
apply_on_boot = true
# Transparent hugepages: "always", "madvise", or "never".
transparent_hugepages = "madvise"
# I/O elevator overrides per device class (auto = pick by class).
io_scheduler_nvme = "none"
io_scheduler_ssd = "mq-deadline"
io_scheduler_hdd = "bfq"
